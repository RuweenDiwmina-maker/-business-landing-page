<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started - Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo">Nexus<span class="text-gradient">.</span></a>
      <div class="nav-links">
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="testimonials.html">Testimonials</a>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='get-started.html'">Get Started</button>
    </div>
  </nav>

  <section class="hero" style="min-height: 100vh; padding-top: 10rem; align-items: flex-start;">
    <div class="hero-glow" style="animation-duration: 12s; background: radial-gradient(circle at center, rgba(121, 40, 202, 0.2) 0%, rgba(0, 0, 0, 0) 60%);"></div>
    
    <div class="container" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
      <div class="section-header reveal" style="margin-bottom: 3rem;">
        <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: -0.04em;">Let's build something <span class="text-gradient-accent">extraordinary</span></h1>
        <p style="font-size: 1.1rem; color: var(--text-secondary); max-width: 500px; margin: 1rem auto 0; font-weight: 300;">Fill out the form below and our team will get back to you within 24 hours.</p>
      </div>

      <div class="form-container reveal reveal-delay-2" style="width: 100%;">
        <form onsubmit="event.preventDefault(); alert('Thank you for reaching out! This is a demo template.');">
          
          <div style="display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" class="form-control" placeholder="John" required>
            </div>
            <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Work Email</label>
            <input type="email" id="email" class="form-control" placeholder="john@company.com" required>
          </div>

          <div class="form-group">
            <label for="company">Company Size</label>
            <select id="company" class="form-control" style="appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 1.2rem top 50%; background-size: 0.65rem auto;">
              <option value="" disabled selected>Select company size...</option>
              <option value="1-10">1-10 employees</option>
              <option value="11-50">11-50 employees</option>
              <option value="51-200">51-200 employees</option>
              <option value="201+">201+ employees</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Project Details</label>
            <textarea id="message" class="form-control" placeholder="Tell us about your project goals and timeline..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1.05rem; margin-top: 1rem;">
            Submit Request
          </button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        &copy; <span id="year"></span> Nexus Inc. All rights reserved.
      </div>
    </div>
  </footer>

  <script>
    feather.replace();
    document.getElementById('year').textContent = new Date().getFullYear();

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    setTimeout(() => document.querySelector('.hero-content.reveal') && document.querySelector('.hero-content.reveal').classList.add('active'), 100);
  </script>
</body>
</html>
